<section class="hero">
  <h1>Booking</h1>
  <p>Reserve your experience</p>

<section class="container">

  <div class="card">

    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

      <input type="text" name="name" placeholder="Your Name" required
        style="width:100%;padding:12px;margin-bottom:10px;border-radius:8px;border:none;">

      <input type="email" name="email" placeholder="Your Email" required
        style="width:100%;padding:12px;margin-bottom:10px;border-radius:8px;border:none;">

      <textarea name="message" placeholder="Your Request" required
        style="width:100%;padding:12px;height:120px;border-radius:8px;border:none;"></textarea>

      <button class="btn" type="submit">Send Booking Request</button>

    </form>

  </div>

</section>
